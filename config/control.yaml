%YAML:1.0
---
enabled: 1
velocity_feedforward_enabled: 1
torque_feedforward_enabled: 0
yaw_max_rate_rad_s: 1.047197551
pitch_max_rate_rad_s: 0.698131701
yaw_max_accel_rad_s2: 4.188790205
pitch_max_accel_rad_s2: 3.141592654
yaw_max_jerk_rad_s3: 41.88790205
pitch_max_jerk_rad_s3: 31.41592654
# Both axes use the same two-state [position, velocity] reference controller.
# Keep the known-good yaw tuning unchanged.  Pitch uses a critically damped
# weighting selected across small/large positive/negative steps; it is faster
# without raising the pitch motion limits seen by the lower loop.
yaw_mpc_position_weight: 250.0
yaw_mpc_velocity_weight: 2.0
pitch_mpc_position_weight: 500.0
pitch_mpc_velocity_weight: 3.0
yaw_mpc_acceleration_weight: 0.015
pitch_mpc_acceleration_weight: 0.005
# Kalman target-rate estimates can jump at a 60 Hz visual update. Limit and
# filter that term before it enters the 1 kHz reference generator.
yaw_target_rate_limit_rad_s: 0.523598776
pitch_target_rate_limit_rad_s: 0.349065850
mpc_target_rate_filter_tau_s: 0.08
target_predict_full_s: 0.20
target_velocity_decay_end_s: 0.50
target_hold_end_s: 1.0
yaw_inertia: 0.0
yaw_viscous: 0.0
yaw_coulomb: 0.0
pitch_inertia: 0.0
pitch_viscous: 0.0
pitch_coulomb: 0.0
pitch_gravity: 0.0
pitch_gravity_zero_rad: 0.0
realtime_priority: 30
cpu_affinity: -1
body_from_camera: !!opencv-matrix
  rows: 3
  cols: 3
  dt: d
  data: [1., 0., 0., 0., 1., 0., 0., 0., 1.]
