%YAML:1.0
---
enabled: 1
velocity_feedforward_enabled: 1
torque_feedforward_enabled: 0
yaw_max_rate_rad_s: 1.047197551
pitch_max_rate_rad_s: 0.698131701
yaw_max_accel_rad_s2: 4.188790205
pitch_max_accel_rad_s2: 3.141592654
yaw_max_jerk_rad_s3: 41.88790205
pitch_max_jerk_rad_s3: 31.41592654
# Three-state reference MPC: [position, velocity, acceleration], controlled by
# jerk. The model and the enforced motion limits therefore use the same input.
yaw_mpc_position_weight: 1000.0
pitch_mpc_position_weight: 1000.0
mpc_velocity_weight: 20.0
mpc_acceleration_weight: 1.0
mpc_jerk_weight: 0.001
# Generic conditioning for the Kalman velocity state; these are physical
# plausibility limits rather than stop/reacquire special cases.
yaw_target_rate_limit_rad_s: 0.349065850
pitch_target_rate_limit_rad_s: 0.261799388
mpc_target_rate_filter_tau_s: 0.04
target_predict_full_s: 0.20
target_velocity_decay_end_s: 0.50
target_hold_end_s: 1.0
yaw_inertia: 0.0
yaw_viscous: 0.0
yaw_coulomb: 0.0
pitch_inertia: 0.0
pitch_viscous: 0.0
pitch_coulomb: 0.0
pitch_gravity: 0.0
pitch_gravity_zero_rad: 0.0
realtime_priority: 30
cpu_affinity: -1
body_from_camera: !!opencv-matrix
  rows: 3
  cols: 3
  dt: d
  data: [1., 0., 0., 0., 1., 0., 0., 0., 1.]
